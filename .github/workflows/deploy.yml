name: AI News Detector Professional CI/CD

# Jab bhi aap code 'main' branch mein push karenge, ye pipeline khud chal paregi
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub se code ko Runner (Machine) par lana
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Docker Hub par login karna (Using Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Docker Buildx setup karna (Advanced features ke liye)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build aur Push (Sab se aham step)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Aapka image name 'username/repo-name'
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-news-detector:latest
          # Cache use karein taake agli baar build fast ho
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Success Message
      - name: Build Success Notification
        run: echo "Mubarak ho! Aapka AI News Detector image Docker Hub par push ho gaya hai."